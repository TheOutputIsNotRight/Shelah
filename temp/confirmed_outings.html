
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif}
.page{font-family:inherit;color:var(--color-text-primary);background:var(--color-background-tertiary,#f7f7fb);min-height:600px}

.hero{background:linear-gradient(135deg,#FF1D58 0%,#F75990 42%,#0049B7 100%);padding:36px 28px 52px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 80% 20%,rgba(0,221,255,.28),transparent 50%),radial-gradient(circle at 5% 85%,rgba(255,224,51,.22),transparent 45%);pointer-events:none}
.hero-inner{max-width:760px;margin:0 auto;position:relative;z-index:1}
.eyebrow{display:inline-flex;align-items:center;gap:7px;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.28);border-radius:50px;padding:5px 14px;font-size:11px;font-weight:700;color:rgba(255,255,255,.92);letter-spacing:.06em;text-transform:uppercase;margin-bottom:14px}
.edot{width:6px;height:6px;border-radius:50%;background:#ffe033;display:inline-block}
.hero h1{font-family:'Baloo 2',sans-serif;font-weight:800;font-size:clamp(22px,4vw,34px);color:white;line-height:1.12;margin-bottom:8px}
.hero p{font-size:14px;color:rgba(255,255,255,.8);margin-bottom:24px}

.group-select-wrap{position:relative;display:inline-block;width:min(360px,100%)}
.group-select-wrap select{width:100%;padding:12px 42px 12px 16px;border-radius:50px;border:2px solid rgba(255,255,255,.35);background:rgba(255,255,255,.15);backdrop-filter:blur(10px);color:white;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;appearance:none;-webkit-appearance:none;outline:none;transition:border-color .2s}
.group-select-wrap select:focus{border-color:rgba(255,255,255,.7)}
.group-select-wrap select option{background:#1a1a2e;color:white}
.sel-arrow{position:absolute;right:16px;top:50%;transform:translateY(-50%);pointer-events:none;color:rgba(255,255,255,.8)}
.sel-arrow svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}

.body{max-width:760px;margin:-20px auto 0;padding:0 20px 48px;position:relative;z-index:2}

.group-card{background:white;border-radius:20px;border:1px solid rgba(0,0,0,.07);padding:20px 24px;margin-bottom:24px;display:flex;align-items:center;gap:14px}
.gc-icon{width:52px;height:52px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
.gc-info h2{font-family:'Baloo 2',sans-serif;font-weight:800;font-size:18px;color:var(--color-text-primary);line-height:1.2}
.gc-info p{font-size:12.5px;color:var(--color-text-secondary);margin-top:3px}
.gc-badge{margin-left:auto;padding:7px 14px;border-radius:50px;font-size:11.5px;font-weight:700;background:rgba(16,185,129,.12);color:#065f46;border:1px solid rgba(16,185,129,.22);flex-shrink:0}

.sort-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.sort-row h3{font-family:'Baloo 2',sans-serif;font-size:16px;font-weight:700;color:var(--color-text-primary)}
.sort-count{font-size:12.5px;color:var(--color-text-secondary)}

.places-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}

.place-card{background:white;border-radius:18px;border:1px solid rgba(0,0,0,.07);overflow:hidden;cursor:pointer;transition:transform .22s cubic-bezier(.22,.68,0,1.2),box-shadow .22s}
.place-card:hover{transform:translateY(-5px);box-shadow:0 16px 40px rgba(0,0,0,.12)}

.place-img{width:100%;height:148px;object-fit:cover;position:relative;display:block}
.place-img-wrap{position:relative;overflow:hidden}
.match-badge{position:absolute;top:10px;right:10px;padding:5px 11px;border-radius:50px;font-size:12px;font-weight:800;font-family:'Baloo 2',sans-serif;color:white;z-index:1}
.match-95{background:linear-gradient(135deg,#10B981,#059669)}
.match-90{background:linear-gradient(135deg,#0049B7,#00DDFF)}
.match-85{background:linear-gradient(135deg,#7c3aed,#a78bfa)}
.match-80{background:linear-gradient(135deg,#FF1D58,#F75990)}
.match-75{background:linear-gradient(135deg,#ff6b35,#ffaa00)}

.place-body{padding:14px 16px 16px}
.place-name{font-family:'Baloo 2',sans-serif;font-weight:700;font-size:15px;color:var(--color-text-primary);margin-bottom:3px}
.place-sub{font-size:12px;color:var(--color-text-secondary);margin-bottom:10px}
.tags{display:flex;flex-wrap:wrap;gap:6px}
.tag{font-size:11px;font-weight:600;padding:4px 10px;border-radius:50px;border:1.5px solid}
.tag-casual{color:#1e40af;border-color:#bfdbfe;background:#eff6ff}
.tag-funny{color:#92400e;border-color:#fde68a;background:#fffbeb}
.tag-romantic{color:#9d174d;border-color:#fbcfe8;background:#fdf2f8}
.tag-cultural{color:#065f46;border-color:#a7f3d0;background:#ecfdf5}
.tag-foodie{color:#7c2d12;border-color:#fed7aa;background:#fff7ed}
.tag-chill{color:#5b21b6;border-color:#ddd6fe;background:#f5f3ff}
.tag-party{color:#831843;border-color:#fbcfe8;background:#fdf2f8}
.tag-adventure{color:#064e3b;border-color:#6ee7b7;background:#ecfdf5}
.tag-scenic{color:#1e3a5f;border-color:#93c5fd;background:#eff6ff}

.no-selection{text-align:center;padding:48px 24px;color:var(--color-text-secondary)}
.no-selection .big-icon{font-size:52px;margin-bottom:14px;display:block}
.no-selection h3{font-family:'Baloo 2',sans-serif;font-weight:700;font-size:18px;color:var(--color-text-primary);margin-bottom:6px}
.no-selection p{font-size:13.5px;line-height:1.6}

@media(max-width:500px){.places-grid{grid-template-columns:1fr}.group-card{flex-wrap:wrap}.gc-badge{margin-left:0}}
</style>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<div class="page">

<div class="hero">
  <div class="hero-inner">
    <div class="eyebrow"><span class="edot"></span> Confirmed Outings</div>
    <h1>Your squad's going out 🗺️</h1>
    <p>Pick a confirmed group to see Shelah's top-matched spots.</p>
    <div class="group-select-wrap">
      <select id="groupSelect" onchange="renderGroup()">
        <option value="">— Choose a group —</option>
        <option value="friday">Friday Night Crew 🌃</option>
        <option value="brunch">Weekend Brunch Gang ☀️</option>
        <option value="culture">Culture Vultures 🎭</option>
      </select>
      <div class="sel-arrow"><svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></div>
    </div>
  </div>
</div>

<div class="body">
  <div id="mainContent">
    <div class="no-selection" style="margin-top:12px;background:white;border-radius:18px;border:1px solid rgba(0,0,0,.07)">
      <span class="big-icon">👆</span>
      <h3>Select a group above</h3>
      <p>Only confirmed groups appear here.<br>Choose one to see Shelah's recommended spots.</p>
    </div>
  </div>
</div>

</div>

<script>
const GROUPS = {
  friday: {
    name: "Friday Night Crew",
    emoji: "🌃",
    gradient: "linear-gradient(135deg,#FF1D58,#0049B7)",
    members: 6,
    date: "Fri, May 9",
    places: [
      {name:"Grand Nile Tower Sky Lounge",sub:"Downtown Cairo",img:"https://images.unsplash.com/photo-1514190051997-0f6f39ca5cde?w=500&q=80",match:95,matchClass:"match-95",tags:["romantic","chill","scenic"]},
      {name:"Koshary El Tahrir",sub:"Tahrir Square",img:"https://images.unsplash.com/photo-1555396273-367ea4eb4db5?w=500&q=80",match:90,matchClass:"match-90",tags:["funny","casual","foodie"]},
      {name:"El Fishawy Cafe",sub:"Khan El Khalili",img:"https://images.unsplash.com/photo-1442975631134-09f7d149b7a0?w=500&q=80",match:85,matchClass:"match-85",tags:["cultural","casual","chill"]},
      {name:"Cairo Jazz Club",sub:"Mohandessin",img:"https://images.unsplash.com/photo-1516450360452-9312f5e86fc7?w=500&q=80",match:80,matchClass:"match-80",tags:["party","chill","romantic"]},
      {name:"Maadi Corniche Walk",sub:"Maadi",img:"https://images.unsplash.com/photo-1504701954957-2010ec3bcec1?w=500&q=80",match:75,matchClass:"match-75",tags:["casual","scenic","adventure"]},
    ]
  },
  brunch: {
    name: "Weekend Brunch Gang",
    emoji: "☀️",
    gradient: "linear-gradient(135deg,#ffe033,#ff6b35)",
    members: 4,
    date: "Sat, May 10",
    places: [
      {name:"The Rooftop at Semiramis",sub:"Garden City",img:"https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=500&q=80",match:95,matchClass:"match-95",tags:["foodie","romantic","scenic"]},
      {name:"Zooba Cairo",sub:"Zamalek",img:"https://images.unsplash.com/photo-1567620905732-2d1ec7ab7445?w=500&q=80",match:88,matchClass:"match-90",tags:["casual","funny","foodie"]},
      {name:"Cairo Marriott Garden",sub:"Zamalek",img:"https://images.unsplash.com/photo-1600891964092-4316c288032e?w=500&q=80",match:82,matchClass:"match-85",tags:["chill","romantic","cultural"]},
    ]
  },
  culture: {
    name: "Culture Vultures",
    emoji: "🎭",
    gradient: "linear-gradient(135deg,#7c3aed,#10B981)",
    members: 5,
    date: "Sun, May 11",
    places: [
      {name:"Egyptian Museum",sub:"Tahrir Square",img:"https://images.unsplash.com/photo-1539650116574-75c0c6d73f6e?w=500&q=80",match:97,matchClass:"match-95",tags:["cultural","adventure","scenic"]},
      {name:"Al-Azhar Park",sub:"Islamic Cairo",img:"https://images.unsplash.com/photo-1569949381669-ecf31ae8e613?w=500&q=80",match:91,matchClass:"match-90",tags:["scenic","chill","cultural"]},
      {name:"Coptic Cairo Walk",sub:"Old Cairo",img:"https://images.unsplash.com/photo-1553913861-c0fddf2619ee?w=500&q=80",match:86,matchClass:"match-85",tags:["cultural","adventure","romantic"]},
      {name:"Cairo Opera House",sub:"Gezira Island",img:"https://images.unsplash.com/photo-1508704019882-f9cf40e475b4?w=500&q=80",match:79,matchClass:"match-80",tags:["cultural","romantic","chill"]},
    ]
  }
};

function tagHtml(t){
  const map={romantic:"tag-romantic",casual:"tag-casual",funny:"tag-funny",cultural:"tag-cultural",foodie:"tag-foodie",chill:"tag-chill",party:"tag-party",adventure:"tag-adventure",scenic:"tag-scenic"};
  return `<span class="tag ${map[t]||'tag-casual'}">${t}</span>`;
}

function renderGroup(){
  const val = document.getElementById('groupSelect').value;
  const el = document.getElementById('mainContent');
  if(!val){
    el.innerHTML=`<div class="no-selection" style="margin-top:12px;background:white;border-radius:18px;border:1px solid rgba(0,0,0,.07)"><span class="big-icon">👆</span><h3>Select a group above</h3><p>Only confirmed groups appear here.<br>Choose one to see Shelah's recommended spots.</p></div>`;
    return;
  }
  const g = GROUPS[val];
  const placesHtml = g.places.map(p=>`
    <div class="place-card">
      <div class="place-img-wrap">
        <img class="place-img" src="${p.img}" alt="${p.name}" loading="lazy" onerror="this.style.background='#e0e0ee';this.src=''">
        <div class="match-badge ${p.matchClass}">${p.match}% match</div>
      </div>
      <div class="place-body">
        <div class="place-name">${p.name}</div>
        <div class="place-sub">${p.sub}</div>
        <div class="tags">${p.tags.map(tagHtml).join('')}</div>
      </div>
    </div>
  `).join('');

  el.innerHTML=`
    <div class="group-card">
      <div class="gc-icon" style="background:${g.gradient}">${g.emoji}</div>
      <div class="gc-info">
        <h2>${g.name}</h2>
        <p>${g.members} members · ${g.date}</p>
      </div>
      <div class="gc-badge">Confirmed ✓</div>
    </div>
    <div class="sort-row">
      <h3>Recommended Spots</h3>
      <span class="sort-count">${g.places.length} places · sorted by match</span>
    </div>
    <div class="places-grid">${placesHtml}</div>
  `;
}
</script>
