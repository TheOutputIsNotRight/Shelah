
<style>
*{box-sizing:border-box;margin:0;padding:0}
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap');

.page{font-family:'DM Sans',sans-serif;color:var(--color-text-primary);background:#f7f7fb;min-height:700px}

.hero{background:linear-gradient(135deg,#FF1D58 0%,#F75990 42%,#0049B7 100%);padding:38px 28px 56px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 82% 18%,rgba(0,221,255,.28),transparent 50%),radial-gradient(circle at 6% 88%,rgba(255,224,51,.22),transparent 45%);pointer-events:none}
.hero-inner{max-width:780px;margin:0 auto;position:relative;z-index:1}
.eyebrow{display:inline-flex;align-items:center;gap:7px;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.28);border-radius:50px;padding:5px 14px;font-size:11px;font-weight:700;color:rgba(255,255,255,.92);letter-spacing:.06em;text-transform:uppercase;margin-bottom:14px}
.edot{width:6px;height:6px;border-radius:50%;background:#ffe033;display:inline-block;flex-shrink:0}
.hero h1{font-family:'Baloo 2',sans-serif;font-weight:800;font-size:clamp(22px,4vw,36px);color:white;line-height:1.1;margin-bottom:8px}
.hero-sub{font-size:14px;color:rgba(255,255,255,.8);margin-bottom:0}
.hero-meta{display:flex;flex-wrap:wrap;align-items:center;gap:10px;margin-top:20px}
.hm-pill{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.28);border-radius:50px;padding:6px 14px;font-size:12.5px;font-weight:600;color:rgba(255,255,255,.92)}
.hm-pill svg{width:13px;height:13px;stroke:rgba(255,255,255,.8);fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}

.body{max-width:780px;margin:-22px auto 0;padding:0 20px 52px;position:relative;z-index:2}

.toolbar{background:white;border-radius:18px;border:1px solid rgba(0,0,0,.07);padding:14px 20px;margin-bottom:22px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.tb-left{display:flex;align-items:center;gap:8px}
.tb-label{font-size:13px;color:var(--color-text-secondary);font-weight:500}
.tb-count{font-family:'Baloo 2',sans-serif;font-weight:800;font-size:22px;color:#FF1D58}
.selected-bar{display:none;align-items:center;gap:10px;background:linear-gradient(135deg,#FF1D58,#F75990);border-radius:50px;padding:8px 16px}
.selected-bar.visible{display:flex}
.sb-txt{font-size:13px;font-weight:700;color:white}
.sb-btn{background:rgba(255,255,255,.25);border:1px solid rgba(255,255,255,.4);border-radius:50px;padding:5px 14px;font-size:12px;font-weight:700;color:white;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .18s}
.sb-btn:hover{background:rgba(255,255,255,.38)}

.results-list{display:flex;flex-direction:column;gap:18px}

.result-card{background:white;border-radius:22px;border:2px solid transparent;overflow:hidden;cursor:pointer;transition:transform .22s cubic-bezier(.22,.68,0,1.2),border-color .2s,box-shadow .22s;display:flex;flex-direction:column}
.result-card:hover{transform:translateY(-4px);box-shadow:0 14px 40px rgba(0,0,0,.11)}
.result-card.selected{border-color:#FF1D58;box-shadow:0 0 0 4px rgba(255,29,88,.12),0 14px 40px rgba(255,29,88,.14);transform:translateY(-2px)}
.result-card.rank-1{border-color:rgba(255,224,51,.5)}
.result-card.rank-1.selected{border-color:#FF1D58}

.card-inner{display:flex;gap:0;min-height:0}

.rank-stripe{width:52px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:20px 0}
.rank-stripe.r1{background:linear-gradient(180deg,#ffe033 0%,#ffaa00 100%)}
.rank-stripe.r2{background:linear-gradient(180deg,#d0d0d8 0%,#a8a8b8 100%)}
.rank-stripe.r3{background:linear-gradient(180deg,#f0a060 0%,#cc7030 100%)}
.rank-stripe.r4,.rank-stripe.r5,.rank-stripe.r6{background:linear-gradient(180deg,#e8e8f0 0%,#d0d0dc 100%)}
.rank-num{font-family:'Baloo 2',sans-serif;font-weight:800;font-size:22px;color:white;line-height:1;text-shadow:0 1px 4px rgba(0,0,0,.2)}
.rank-stripe.r4 .rank-num,.rank-stripe.r5 .rank-num,.rank-stripe.r6 .rank-num{color:#5a5a7a;text-shadow:none}
.rank-label{font-size:9px;font-weight:700;color:rgba(255,255,255,.85);letter-spacing:.06em;text-transform:uppercase;text-shadow:0 1px 3px rgba(0,0,0,.2)}
.rank-stripe.r4 .rank-label,.rank-stripe.r5 .rank-label,.rank-stripe.r6 .rank-label{color:#8888a8;text-shadow:none}

.card-img-wrap{width:180px;flex-shrink:0;position:relative;overflow:hidden}
.card-img{width:100%;height:100%;object-fit:cover;display:block;min-height:170px}
.match-pill{position:absolute;bottom:10px;left:10px;padding:6px 12px;border-radius:50px;font-family:'Baloo 2',sans-serif;font-size:13px;font-weight:800;color:white;line-height:1}
.mp-gold{background:linear-gradient(135deg,#d4a017,#f0c040)}
.mp-green{background:linear-gradient(135deg,#10B981,#059669)}
.mp-blue{background:linear-gradient(135deg,#0049B7,#00DDFF)}
.mp-purple{background:linear-gradient(135deg,#7c3aed,#a78bfa)}
.mp-pink{background:linear-gradient(135deg,#FF1D58,#F75990)}
.mp-orange{background:linear-gradient(135deg,#ff6b35,#ffaa00)}

.card-body{flex:1;padding:20px 22px;display:flex;flex-direction:column;gap:10px;min-width:0}
.card-top-row{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.place-name{font-family:'Baloo 2',sans-serif;font-weight:800;font-size:17px;color:var(--color-text-primary);line-height:1.2}
.place-type{font-size:12px;color:var(--color-text-secondary);margin-top:2px;font-weight:500}
.select-check{width:26px;height:26px;border-radius:50%;border:2px solid rgba(0,0,0,.15);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;background:transparent}
.select-check svg{width:13px;height:13px;stroke:#bbb;fill:none;stroke-width:3;stroke-linecap:round;stroke-linejoin:round;opacity:0;transition:opacity .2s}
.result-card.selected .select-check{background:#FF1D58;border-color:#FF1D58}
.result-card.selected .select-check svg{stroke:white;opacity:1}

.tags{display:flex;flex-wrap:wrap;gap:6px}
.tag{font-size:11px;font-weight:600;padding:4px 10px;border-radius:50px;border:1.5px solid}
.t-casual{color:#1e40af;border-color:#bfdbfe;background:#eff6ff}
.t-funny{color:#92400e;border-color:#fde68a;background:#fffbeb}
.t-romantic{color:#9d174d;border-color:#fbcfe8;background:#fdf2f8}
.t-cultural{color:#065f46;border-color:#a7f3d0;background:#ecfdf5}
.t-foodie{color:#7c2d12;border-color:#fed7aa;background:#fff7ed}
.t-chill{color:#5b21b6;border-color:#ddd6fe;background:#f5f3ff}
.t-party{color:#831843;border-color:#fbcfe8;background:#fdf2f8}
.t-adventure{color:#064e3b;border-color:#6ee7b7;background:#ecfdf5}
.t-scenic{color:#1e3a5f;border-color:#93c5fd;background:#eff6ff}
.t-lively{color:#78350f;border-color:#fcd34d;background:#fffbeb}

.card-stats{display:flex;gap:20px;flex-wrap:wrap;margin-top:4px}
.stat{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--color-text-secondary)}
.stat svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.stat strong{color:var(--color-text-primary);font-weight:700}

.card-footer{border-top:1px solid rgba(0,0,0,.06);padding:12px 22px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.match-bar-wrap{flex:1;min-width:120px;max-width:260px}
.match-bar-label{font-size:11px;color:var(--color-text-secondary);font-weight:600;margin-bottom:5px;display:flex;justify-content:space-between}
.match-bar-track{height:6px;border-radius:50px;background:#f0f0f6;overflow:hidden}
.match-bar-fill{height:100%;border-radius:50px;transition:width .6s cubic-bezier(.22,.68,0,1.2)}

.select-btn{padding:9px 18px;border-radius:50px;font-size:13px;font-weight:700;border:2px solid rgba(0,0,0,.1);background:transparent;cursor:pointer;font-family:'DM Sans',sans-serif;color:var(--color-text-secondary);transition:all .2s;white-space:nowrap}
.result-card.selected .select-btn{background:linear-gradient(135deg,#FF1D58,#F75990);border-color:transparent;color:white}

.first-crown{font-size:16px;margin-left:4px}

@media(max-width:560px){
  .card-img-wrap{width:120px}.card-img{min-height:150px}
  .rank-stripe{width:40px}.rank-num{font-size:18px}
  .card-body{padding:14px 14px}
  .place-name{font-size:15px}
  .card-stats{gap:12px}
}
</style>

<div class="page">

<div class="hero">
  <div class="hero-inner">
    <div class="eyebrow"><span class="edot"></span> Shelah Results</div>
    <h1>Best picks for Friday Night Crew <span style="font-size:28px">🌃</span></h1>
    <p class="hero-sub">Ranked by overall group match — budget, distance &amp; vibes combined.</p>
    <div class="hero-meta">
      <div class="hm-pill">
        <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        6 members
      </div>
      <div class="hm-pill">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Fri, May 9
      </div>
      <div class="hm-pill">
        <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        Cairo, Maadi
      </div>
      <div class="hm-pill">
        <svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        Up to 250 EGP
      </div>
    </div>
  </div>
</div>

<div class="body">

  <div class="toolbar">
    <div class="tb-left">
      <span class="tb-label">Showing</span>
      <span class="tb-count">6</span>
      <span class="tb-label">recommended spots</span>
    </div>
    <div class="selected-bar" id="selBar">
      <span class="sb-txt" id="selTxt">1 place selected</span>
      <button class="sb-btn" onclick="clearAll()">Clear</button>
      <button class="sb-btn" onclick="voteSelected()">Vote for this ↗</button>
    </div>
  </div>

  <div class="results-list" id="resultsList"></div>

</div>
</div>

<script>
const PLACES = [
  {
    id:1,rank:1,name:"Grand Nile Tower Sky Lounge",type:"Rooftop bar & restaurant",
    img:"https://images.unsplash.com/photo-1514190051997-0f6f39ca5cde?w=600&q=80",
    match:97,matchClass:"mp-gold",rankClass:"r1",rankLabel:"Top pick",
    tags:["romantic","scenic","chill"],
    dist:"3.2 km",budget:"220 EGP / person",
    barColor:"linear-gradient(90deg,#d4a017,#f0c040)"
  },
  {
    id:2,rank:2,name:"Zooba Cairo",type:"Modern Egyptian street food",
    img:"https://images.unsplash.com/photo-1567620905732-2d1ec7ab7445?w=600&q=80",
    match:92,matchClass:"mp-green",rankClass:"r2",rankLabel:"2nd",
    tags:["casual","funny","foodie"],
    dist:"1.8 km",budget:"130 EGP / person",
    barColor:"linear-gradient(90deg,#10B981,#059669)"
  },
  {
    id:3,rank:3,name:"Cairo Jazz Club",type:"Live music lounge",
    img:"https://images.unsplash.com/photo-1516450360452-9312f5e86fc7?w=600&q=80",
    match:87,matchClass:"mp-blue",rankClass:"r3",rankLabel:"3rd",
    tags:["party","chill","lively"],
    dist:"5.1 km",budget:"180 EGP / person",
    barColor:"linear-gradient(90deg,#0049B7,#00DDFF)"
  },
  {
    id:4,rank:4,name:"El Fishawy Cafe",type:"Historic coffeehouse · Khan El Khalili",
    img:"https://images.unsplash.com/photo-1442975631134-09f7d149b7a0?w=600&q=80",
    match:81,matchClass:"mp-purple",rankClass:"r4",rankLabel:"4th",
    tags:["cultural","casual","chill"],
    dist:"8.4 km",budget:"80 EGP / person",
    barColor:"linear-gradient(90deg,#7c3aed,#a78bfa)"
  },
  {
    id:5,rank:5,name:"Kempinski Nile Terrace",type:"Waterfront restaurant",
    img:"https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=600&q=80",
    match:75,matchClass:"mp-pink",rankClass:"r5",rankLabel:"5th",
    tags:["romantic","scenic","foodie"],
    dist:"4.0 km",budget:"240 EGP / person",
    barColor:"linear-gradient(90deg,#FF1D58,#F75990)"
  },
  {
    id:6,rank:6,name:"Maadi Corniche Walk",type:"Outdoor promenade & cafes",
    img:"https://images.unsplash.com/photo-1504701954957-2010ec3bcec1?w=600&q=80",
    match:68,matchClass:"mp-orange",rankClass:"r6",rankLabel:"6th",
    tags:["casual","adventure","scenic"],
    dist:"0.9 km",budget:"60 EGP / person",
    barColor:"linear-gradient(90deg,#ff6b35,#ffaa00)"
  }
];

const tagMap={romantic:"t-romantic",scenic:"t-scenic",chill:"t-chill",casual:"t-casual",funny:"t-funny",foodie:"t-foodie",party:"t-party",lively:"t-lively",cultural:"t-cultural",adventure:"t-adventure"};

let selected = new Set();

function tagHtml(t){
  return `<span class="tag ${tagMap[t]||'t-casual'}">${t}</span>`;
}

function render(){
  const list = document.getElementById('resultsList');
  list.innerHTML = PLACES.map(p=>{
    const isSel = selected.has(p.id);
    const crown = p.rank===1 ? '<span class="first-crown">👑</span>' : '';
    return `
    <div class="result-card${isSel?' selected':''} ${p.rank===1&&!isSel?' rank-1':''}" id="card${p.id}" onclick="toggleCard(${p.id})">
      <div class="card-inner">
        <div class="rank-stripe ${p.rankClass}">
          <div class="rank-num">${p.rank}</div>
          <div class="rank-label">${p.rankLabel}</div>
        </div>
        <div class="card-img-wrap">
          <img class="card-img" src="${p.img}" alt="${p.name}" loading="lazy" onerror="this.style.background='#dde'">
          <div class="match-pill ${p.matchClass}">${p.match}% match</div>
        </div>
        <div class="card-body">
          <div class="card-top-row">
            <div>
              <div class="place-name">${p.name}${crown}</div>
              <div class="place-type">${p.type}</div>
            </div>
            <div class="select-check">
              <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
          </div>
          <div class="tags">${p.tags.map(tagHtml).join('')}</div>
          <div class="card-stats">
            <div class="stat">
              <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
              <strong>${p.dist}</strong> away
            </div>
            <div class="stat">
              <svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
              Est. <strong>${p.budget}</strong>
            </div>
          </div>
        </div>
      </div>
      <div class="card-footer">
        <div class="match-bar-wrap">
          <div class="match-bar-label">
            <span>Group match score</span>
            <span style="font-weight:700;color:var(--color-text-primary)">${p.match}%</span>
          </div>
          <div class="match-bar-track">
            <div class="match-bar-fill" style="width:${p.match}%;background:${p.barColor}"></div>
          </div>
        </div>
        <button class="select-btn">${isSel ? '✓ Selected' : 'Select place'}</button>
      </div>
    </div>
    `;
  }).join('');
}

function toggleCard(id){
  if(selected.has(id)) selected.delete(id);
  else selected.add(id);
  updateSelBar();
  render();
}

function updateSelBar(){
  const bar = document.getElementById('selBar');
  const txt = document.getElementById('selTxt');
  if(selected.size>0){
    bar.classList.add('visible');
    txt.textContent = selected.size===1 ? '1 place selected' : `${selected.size} places selected`;
  } else {
    bar.classList.remove('visible');
  }
}

function clearAll(){
  selected.clear();
  updateSelBar();
  render();
}

function voteSelected(){
  const names = PLACES.filter(p=>selected.has(p.id)).map(p=>p.name).join(', ');
  sendPrompt(`The group voted for: ${names}. What are the next steps to confirm this outing?`);
}

render();
</script>
