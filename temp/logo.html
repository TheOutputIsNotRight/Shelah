<!DOCTYPE html>
<html>

<head>
    <link
        href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@800&family=Paytone+One&family=Space+Grotesk:wght@700&display=swap"
        rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: transparent;
            font-family: sans-serif;
            padding: 24px 16px 32px;
        }

        .grid {
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        .card {
            border-radius: 22px;
            padding: 28px 24px 20px;
            border: 1.5px solid rgba(0, 0, 0, 0.06);
            background: rgba(255, 255, 255, 0.5);
            position: relative;
            overflow: hidden;
            cursor: default;
        }

        .num {
            position: absolute;
            top: 14px;
            right: 16px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1.5px;
            padding: 4px 12px;
            border-radius: 20px;
            text-transform: uppercase;
            background: rgba(0, 0, 0, 0.05);
            color: #888;
        }

        .row {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        /* --- BUBBLES --- */
        .bubs {
            position: relative;
            width: 115px;
            height: 85px;
            flex-shrink: 0;
        }

        .bub {
            border-radius: 50%;
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .card:hover .bub:nth-child(1) {
            transform: translateY(-7px) scale(1.1);
        }

        .card:hover .bub:nth-child(2) {
            transform: translateY(-4px) scale(1.07);
        }

        .card:hover .bub:nth-child(3) {
            transform: translateY(-9px) scale(1.13);
        }

        .card:hover .bub:nth-child(4) {
            transform: translateY(-3px) scale(1.06);
        }

        .card:hover .bub:nth-child(5) {
            transform: translateY(-6px) scale(1.09);
        }

        /* --- WORDMARK BASE --- */
        .word {
            line-height: 1;
            display: block;
        }

        .tag {
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #bbb;
            margin-top: 7px;
            font-weight: 600;
        }

        /* FONT A: Baloo 2 */
        .fa {
            font-family: 'Baloo 2', cursive;
            font-weight: 800;
        }

        /* FONT B: Paytone One */
        .fb {
            font-family: 'Paytone One', cursive;
        }

        /* FONT C: Space Grotesk */
        .fc {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
        }

        /* gradient text helper */
        .gtext {
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
            transition: letter-spacing 0.4s ease, filter 0.4s ease;
        }

        .card:hover .gtext {
            filter: brightness(1.12);
        }

        /* per-letter span gradient — each letter transitions its own color */
        .letter {
            display: inline-block;
            transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .card:hover .letter:nth-child(1) {
            transform: translateY(-4px);
        }

        .card:hover .letter:nth-child(2) {
            transform: translateY(-2px);
        }

        .card:hover .letter:nth-child(3) {
            transform: translateY(-5px);
        }

        .card:hover .letter:nth-child(4) {
            transform: translateY(-2px);
        }

        .card:hover .letter:nth-child(5) {
            transform: translateY(-4px);
        }

        .card:hover .letter:nth-child(6) {
            transform: translateY(-3px);
        }

        /* individual letter gradients — 6 gradient "flows" */
        /* Flow 1: Sunset – orange→pink→purple */
        .f1-l1 {
            background: linear-gradient(135deg, #FF8C42, #FF6060);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .f1-l2 {
            background: linear-gradient(135deg, #FF5E7A, #FF4D8D);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .f1-l3 {
            background: linear-gradient(135deg, #FF4D8D, #C44DCF);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .f1-l4 {
            background: linear-gradient(135deg, #B44DD8, #8B60E8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .f1-l5 {
            background: linear-gradient(135deg, #7B6AEC, #5B7EF8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .f1-l6 {
            background: linear-gradient(135deg, #4D8EFF, #3BBDE4);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Flow 2: Tropical – yellow→green→cyan */
        .f2-l1 {
            background: linear-gradient(135deg, #FFD93D, #FFB830);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .f2-l2 {
            background: linear-gradient(135deg, #FFB020, #FF8C42);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .f2-l3 {
            background: linear-gradient(135deg, #FF7A40, #FF4D8D);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .f2-l4 {
            background: linear-gradient(135deg, #FF4DAA, #CC4DCC);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .f2-l5 {
            background: linear-gradient(135deg, #AA44EE, #7755FF);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .f2-l6 {
            background: linear-gradient(135deg, #5566FF, #3BBDE4);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Flow 3: Candy – hot pink→orange→yellow */
        .f3-l1 {
            background: linear-gradient(135deg, #FF3CAC, #FF5B8D);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .f3-l2 {
            background: linear-gradient(135deg, #FF5B7A, #FF6B55);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .f3-l3 {
            background: linear-gradient(135deg, #FF7A42, #FF9630);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .f3-l4 {
            background: linear-gradient(135deg, #FFA820, #FFD93D);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .f3-l5 {
            background: linear-gradient(135deg, #FFE030, #E8FF44);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .f3-l6 {
            background: linear-gradient(135deg, #CCFF44, #66EE88);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .fnote {
            font-size: 12px;
            color: #AAA;
            margin-top: 14px;
            padding-top: 12px;
            border-top: 1px solid rgba(0, 0, 0, 0.05);
        }

        .fnote strong {
            color: #777;
            font-weight: 600;
        }

        @media(prefers-color-scheme:dark) {
            .card {
                background: rgba(255, 255, 255, 0.04);
                border-color: rgba(255, 255, 255, 0.07);
            }

            .num {
                background: rgba(255, 255, 255, 0.07);
                color: #666;
            }

            .tag {
                color: #555;
            }

            .fnote {
                color: #555;
                border-color: rgba(255, 255, 255, 0.06);
            }

            .fnote strong {
                color: #888;
            }
        }
    </style>
</head>

<body>

    <div class="grid">
        <div class="card">
            <span class="num">01</span>
            <div class="row">
                <div class="bubs">
                    <div class="bub"
                        style="width:44px;height:44px;background:linear-gradient(135deg,#FF8C42,#FF4D8D);left:0;top:26px;">
                        <svg width="44" height="44">
                            <circle cx="22" cy="16" r="7" fill="rgba(255,255,255,0.82)" />
                            <ellipse cx="22" cy="31" rx="10.5" ry="8" fill="rgba(255,255,255,0.82)" />
                        </svg>
                    </div>
                    <div class="bub"
                        style="width:36px;height:36px;background:linear-gradient(135deg,#FFD93D,#FF8C42);left:30px;top:8px;">
                        <svg width="36" height="36">
                            <circle cx="18" cy="12" r="5.5" fill="rgba(255,255,255,0.82)" />
                            <ellipse cx="18" cy="25" rx="8.5" ry="6.5" fill="rgba(255,255,255,0.82)" />
                        </svg>
                    </div>
                    <div class="bub"
                        style="width:50px;height:50px;background:linear-gradient(135deg,#FF4D8D,#9B72E4);left:54px;top:20px;">
                        <svg width="50" height="50">
                            <circle cx="25" cy="17" r="8" fill="rgba(255,255,255,0.82)" />
                            <ellipse cx="25" cy="35" rx="12.5" ry="9" fill="rgba(255,255,255,0.82)" />
                        </svg>
                    </div>
                    <div class="bub"
                        style="width:38px;height:38px;background:linear-gradient(135deg,#3BBDE4,#9B72E4);left:86px;top:7px;">
                        <svg width="38" height="38">
                            <circle cx="19" cy="13" r="6" fill="rgba(255,255,255,0.82)" />
                            <ellipse cx="19" cy="27" rx="9" ry="7" fill="rgba(255,255,255,0.82)" />
                        </svg>
                    </div>
                    <div class="bub"
                        style="width:34px;height:34px;background:linear-gradient(135deg,#9B72E4,#3BBDE4);left:112px;top:28px;">
                        <svg width="34" height="34">
                            <circle cx="17" cy="11" r="5" fill="rgba(255,255,255,0.82)" />
                            <ellipse cx="17" cy="24" rx="8" ry="6" fill="rgba(255,255,255,0.82)" />
                        </svg>
                    </div>
                </div>
                <div>
                    <div class="word fa" style="font-size:66px;">
                        <span class="letter f1-l1">S</span><span class="letter f1-l2">h</span><span
                            class="letter f1-l3">e</span><span class="letter f1-l4">l</span><span
                            class="letter f1-l5">a</span><span class="letter f1-l6">h</span>
                    </div>
                    <div class="tag">your crew · your vibe</div>
                </div>
            </div>
            <div class="fnote"><strong>Baloo 2 ExtraBold</strong> · Sunset gradient (orange → pink → purple → blue) ·
                Soft bounce on hover</div>
        </div>
    </div>
</body>

</html>
