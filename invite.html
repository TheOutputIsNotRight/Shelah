<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shelah — Friend Invite</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <nav class="nav">
    <a href="/" class="nav-logo">
      <div class="row">
        <div class="bubs">
          <div class="bub" style="width:44px;height:44px;background:linear-gradient(135deg,#FF8C42,#FF4D8D);left:0;top:26px;"><svg width="44" height="44"><circle cx="22" cy="16" r="7" fill="rgba(255,255,255,0.82)"></circle><ellipse cx="22" cy="31" rx="10.5" ry="8" fill="rgba(255,255,255,0.82)"></ellipse></svg></div>
          <div class="bub" style="width:36px;height:36px;background:linear-gradient(135deg,#FFD93D,#FF8C42);left:30px;top:8px;"><svg width="36" height="36"><circle cx="18" cy="12" r="5.5" fill="rgba(255,255,255,0.82)"></circle><ellipse cx="18" cy="25" rx="8.5" ry="6.5" fill="rgba(255,255,255,0.82)"></ellipse></svg></div>
          <div class="bub" style="width:50px;height:50px;background:linear-gradient(135deg,#FF4D8D,#9B72E4);left:54px;top:20px;"><svg width="50" height="50"><circle cx="25" cy="17" r="8" fill="rgba(255,255,255,0.82)"></circle><ellipse cx="25" cy="35" rx="12.5" ry="9" fill="rgba(255,255,255,0.82)"></ellipse></svg></div>
          <div class="bub" style="width:38px;height:38px;background:linear-gradient(135deg,#3BBDE4,#9B72E4);left:86px;top:7px;"><svg width="38" height="38"><circle cx="19" cy="13" r="6" fill="rgba(255,255,255,0.82)"></circle><ellipse cx="19" cy="27" rx="9" ry="7" fill="rgba(255,255,255,0.82)"></ellipse></svg></div>
          <div class="bub" style="width:34px;height:34px;background:linear-gradient(135deg,#9B72E4,#3BBDE4);left:112px;top:28px;"><svg width="34" height="34"><circle cx="17" cy="11" r="5" fill="rgba(255,255,255,0.82)"></circle><ellipse cx="17" cy="24" rx="8" ry="6" fill="rgba(255,255,255,0.82)"></ellipse></svg></div>
        </div>
        <div>
          <div class="word fa" style="font-size:66px;">
            <span class="letter f1-l1">S</span><span class="letter f1-l2">h</span><span class="letter f1-l3">e</span><span class="letter f1-l4">l</span><span class="letter f1-l5">a</span><span class="letter f1-l6">h</span>
          </div>
          <div class="tag">your crew · your vibe</div>
        </div>
      </div>
    </a>
    <div class="nav-right" id="nav-user"></div>
  </nav>
  <div class="hero-banner blue">
    <div class="hero-inner">
      <div class="hero-eyebrow"><span class="dot"></span> Friend Invite</div>
      <h1 class="hero-title">You've been invited! 🎉</h1>
      <p class="hero-sub" id="invite-msg">Processing your invite link...</p>
    </div>
  </div>
  <div class="page-body" style="max-width:500px;text-align:center">
    <div class="card" style="padding:40px 30px">
      <div id="invite-status">
        <div style="font-size:48px;margin-bottom:16px">⏳</div>
        <p style="color:var(--text-muted)">Processing invite...</p>
      </div>
    </div>
  </div>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    async function onAuthReady() {
      const code = new URLSearchParams(window.location.search).get('code');
      const status = document.getElementById('invite-status');
      if (!code) {
        status.innerHTML = '<div style="font-size:48px;margin-bottom:16px">❌</div><p style="font-weight:600;font-size:16px">Invalid invite link</p><p style="color:var(--text-muted);margin-top:8px">This link appears to be broken.</p><a href="/" class="btn btn-primary" style="margin-top:20px">Go Home</a>';
        return;
      }
      if (!window.currentUser) {
        status.innerHTML = '<div style="font-size:48px;margin-bottom:16px">🔐</div><p style="font-weight:600;font-size:16px">Sign in to accept this invite</p><p style="color:var(--text-muted);margin-top:8px">You need an account to add friends.</p><a href="/index.html?login=1" class="btn btn-primary" style="margin-top:20px">Sign In</a>';
        document.getElementById('invite-msg').textContent = 'Sign in to accept this friend invite';
        return;
      }
      try {
        const info = await getInviteInfo(code);
        status.innerHTML = `
          <div style="font-size:48px;margin-bottom:16px">👋</div>
          <p style="font-weight:600;font-size:16px">Add ${escapeHtml(info.display_name)} as a friend?</p>
          <p style="color:var(--text-muted);margin-top:8px">They will be able to invite you to outings and see your public plans.</p>
          <div style="display:flex;gap:12px;justify-content:center;margin-top:20px">
            <button class="btn btn-secondary" onclick="window.location.href='/'">Cancel</button>
            <button class="btn btn-primary" id="confirm-btn">Confirm Request</button>
          </div>
        `;
        document.getElementById('invite-msg').textContent = 'Confirm friend request';
        
        document.getElementById('confirm-btn').addEventListener('click', async () => {
          try {
            document.getElementById('confirm-btn').disabled = true;
            document.getElementById('confirm-btn').textContent = 'Sending...';
            const data = await sendInviteRequest(code);
            status.innerHTML = '<div style="font-size:48px;margin-bottom:16px">🎉</div><p style="font-weight:600;font-size:16px">' + escapeHtml(data.message) + '</p><a href="/friends.html" class="btn btn-primary" style="margin-top:20px">View Friends</a>';
            document.getElementById('invite-msg').textContent = 'Friend request sent!';
          } catch(e) {
            status.innerHTML = '<div style="font-size:48px;margin-bottom:16px">⚠️</div><p style="font-weight:600;font-size:16px">' + escapeHtml(e.error || 'Something went wrong') + '</p><a href="/" class="btn btn-primary" style="margin-top:20px">Go Home</a>';
            document.getElementById('invite-msg').textContent = e.error || 'Could not process invite';
          }
        });
      } catch(e) {
        status.innerHTML = '<div style="font-size:48px;margin-bottom:16px">⚠️</div><p style="font-weight:600;font-size:16px">' + escapeHtml(e.error || 'Invalid invite link') + '</p><a href="/" class="btn btn-primary" style="margin-top:20px">Go Home</a>';
        document.getElementById('invite-msg').textContent = e.error || 'Could not load invite info';
      }
    }
  </script>
</body>
</html>
