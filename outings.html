<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="View all your planned outings with friends.">
  <title>Your Outings — Shelah</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<nav class="nav"><div class="container"><a href="/" class="nav-brand"><span>🎉</span> Shelah</a><div id="nav-user"></div></div></nav>

<main class="container" style="padding-bottom:48px">
  <div class="page-header">
    <h1>🗓️ Your Outings</h1>
    <a href="/create-outing.html" class="btn btn-accent">+ Create New Outing</a>
  </div>

  <div id="outings-container">
    <div class="skeleton" style="height:80px;margin-bottom:12px"></div>
    <div class="skeleton" style="height:80px;margin-bottom:12px"></div>
    <div class="skeleton" style="height:80px"></div>
  </div>
</main>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script>
  async function onAuthReady() {
    if (!requireAuth()) return;
    await loadOutings();
  }

  async function loadOutings() {
    const container = document.getElementById('outings-container');
    try {
      const data = await getOutings();
      if (!data.outings.length) {
        container.innerHTML = `<div class="empty-state">
          <span class="icon">🎯</span>
          <div class="title">No outings yet!</div>
          <p>Create your first outing and invite friends.</p>
          <a href="/create-outing.html" class="btn btn-primary" style="margin-top:16px">Create Outing</a>
        </div>`;
        return;
      }
      container.innerHTML = data.outings.map(o => {
        const typeCls = { open:'pill-open', closed:'pill-closed', restricted:'pill-restricted' }[o.outing_type] || '';
        const typeLabel = { open:'🌐 Open', closed:'🔒 Closed', restricted:'🔑 Restricted' }[o.outing_type] || o.outing_type;
        const avatars = (o.members_preview||[]).map(m => avatarHtml(m.display_name, 32)).join('');
        const extra = o.member_count > 4 ? `<div class="avatar avatar-more" style="width:32px;height:32px;font-size:0.7rem">+${o.member_count-4}</div>` : '';
        const statusIcons = (o.invite_status==='accepted'?'✅':'⏳') + ' ' + (o.requirements_submitted?'📋':'❓');
        return `<div class="outing-card" onclick="window.location.href='/outing.html?id=${o.id}'">
          <div class="outing-card-info">
            <div class="outing-card-name">${escapeHtml(o.name)}</div>
            <div class="outing-card-date">${formatDate(o.scheduled_date)}</div>
          </div>
          <div class="outing-card-right">
            <span class="pill ${typeCls}">${typeLabel}</span>
            <div class="avatar-stack">${avatars}${extra}</div>
            <span style="font-size:0.85rem">${statusIcons}</span>
          </div>
        </div>`;
      }).join('');
    } catch (err) {
      container.innerHTML = '<div class="empty-state"><span class="icon">⚠️</span><p>Failed to load outings</p></div>';
    }
  }
</script>
</body>
</html>
